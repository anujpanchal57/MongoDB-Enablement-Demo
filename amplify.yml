# =============================================================================
# AWS Amplify Hosting build spec (monorepo).
#
# Amplify Hosting builds & serves the Next.js FRONTEND only. The FastAPI backend
# is a long-running server and is deployed separately on AWS App Runner (see
# README "Deployment to AWS"); the frontend reaches it via NEXT_PUBLIC_API_BASE_URL.
# =============================================================================
version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
